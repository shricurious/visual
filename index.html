<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Code Storyteller</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
    <header>
        <div class="controls">
            <select id="sourceLang" onchange="changeSourceLanguage(this.value)">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
            </select>
            <select id="visualizerSelect" onchange="changeVisualizer(this.value)">
                <option value="blockly">Blocks (Blockly)</option>
                <option value="mermaid">Flowchart (Mermaid)</option>
            </select>
            <div id="status" class="status-badge">⏳ Initializing...</div>
        </div>
    </header>

    <main>
        <div class="editor-pane">
            <textarea id="codeIn" placeholder="Paste code here..."></textarea>
        </div>

        <div class="output-pane">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'tab-pseudo')">Pseudocode</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-visual')">Visualizer</button>
            </div>

            <div id="tab-pseudo" class="tab-content active">
                <pre id="pseudoOut"></pre>
            </div>

            <div id="tab-visual" class="tab-content">
                <div id="blocklyDiv"></div>
                <div id="mermaidDiv" style="display:none;"></div>
            </div>
        </div>
    </main>

    <script src="transformer.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
